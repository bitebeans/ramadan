[build]
  command = "echo VITE_SUPABASE_URL=$VITE_SUPABASE_URL >> .env && echo VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY >> .env && echo VITE_SUPABASE_SERVICE_ROLE_KEY=$VITE_SUPABASE_SERVICE_ROLE_KEY >> .env && echo VITE_SUPERADMIN_PASSWORD=$VITE_SUPERADMIN_PASSWORD >> .env && echo VITE_CAFE_WHATSAPP_NUMBER=$VITE_CAFE_WHATSAPP_NUMBER >> .env && echo VITE_WA_COUNTRY_CODE=$VITE_WA_COUNTRY_CODE >> .env && echo VITE_APP_NAME=$VITE_APP_NAME >> .env && echo VITE_APP_URL=$VITE_APP_URL >> .env && echo VITE_ITEM_NAME=$VITE_ITEM_NAME >> .env && echo VITE_ITEM_PRICE=$VITE_ITEM_PRICE >> .env && echo VITE_DEFAULT_DELIVERY_CHARGE=$VITE_DEFAULT_DELIVERY_CHARGE >> .env && npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
